<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - EventHub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <h2>EventHub</h2>
                </div>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="create-event.html" class="nav-link">Create Event</a>
                    </li>
                    <li class="nav-item">
                        <a href="view-events.html" class="nav-link">View Events</a>
                    </li>
                    <li class="nav-item">
                        <a href="calendar.html" class="nav-link">Calendar</a>
                    </li>
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact Us</a>
                    </li>
                </ul>
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn" aria-label="Toggle dark mode">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <div class="container">
                <h1 class="page-title">Edit Event</h1>
                <div class="form-container">
                    <form id="editEventForm" class="event-form">
                        <input type="hidden" id="eventId" name="eventId">
                        
                        <div class="form-group">
                            <label for="eventName">Event Name *</label>
                            <input type="text" id="eventName" name="eventName" required>
                            <span class="error-message" id="eventNameError"></span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventDate">Date *</label>
                                <input type="date" id="eventDate" name="eventDate" required>
                                <span class="error-message" id="eventDateError"></span>
                            </div>
                            <div class="form-group">
                                <label for="eventTime">Time *</label>
                                <input type="time" id="eventTime" name="eventTime" required>
                                <span class="error-message" id="eventTimeError"></span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="eventCategory">Category</label>
                            <select id="eventCategory" name="eventCategory">
                                <option value="work">Work</option>
                                <option value="personal">Personal</option>
                                <option value="social">Social</option>
                                <option value="health">Health</option>
                                <option value="education">Education</option>
                                <option value="travel">Travel</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="eventPriority">Priority</label>
                            <select id="eventPriority" name="eventPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="eventLocation">Location *</label>
                            <input type="text" id="eventLocation" name="eventLocation" required>
                            <span class="error-message" id="eventLocationError"></span>
                        </div>

                        <div class="form-group">
                            <label for="eventDescription">Description</label>
                            <textarea id="eventDescription" name="eventDescription" rows="4" placeholder="Enter event description (optional)"></textarea>
                        </div>

                        <div class="form-buttons">
                            <button type="submit" class="btn btn-primary">Update Event</button>
                            <a href="view-events.html" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 EventHub. All rights reserved.</p>
        </div>
    </footer>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Success!</h2>
            <p>Your event has been updated successfully.</p>
            <div class="modal-buttons">
                <a href="view-events.html" class="btn btn-primary">View Events</a>
                <a href="calendar.html" class="btn btn-secondary">View Calendar</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
